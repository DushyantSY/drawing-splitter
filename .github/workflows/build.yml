name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd drawing_splitter
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
        shell: cmd

      - name: Build EXE with PyInstaller
        run: |
          cd drawing_splitter
          pyinstaller ^
            --name "DrawingSplitter" ^
            --onefile ^
            --windowed ^
            --add-data "config;config" ^
            --hidden-import=fitz ^
            --hidden-import=PIL ^
            app.py
        shell: cmd

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DrawingSplitter-Windows
          path: drawing_splitter\dist\DrawingSplitter.exe
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: "Drawing Splitter v${{ github.run_number }}"
          body: |
            ## Drawing Splitter — Windows Desktop App
            👇 Click **DrawingSplitter.exe** below to download.
            No Python or installation required. Double-click to run on Windows 10/11.
          files: drawing_splitter/dist/DrawingSplitter.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
